services:
  mongo:
    profiles: ["mongo"]
    image: mongo:7
    container_name: jokes_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/seed.js:/docker-entrypoint-initdb.d/seed.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    container_name: jokes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jokes_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  joke-service:
    image: ${JOKE_IMAGE}
    container_name: joke_service
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
        required: false
      mysql:
        condition: service_healthy
        required: false
    environment:
      JOKE_SERVICE_DB_ENGINE: ${DB_PROFILE_UPPER}
      JOKE_SERVICE_DB_HOST: ${JOKE_SERVICE_DB_HOST}
      JOKE_SERVICE_DB_USER: ${JOKE_SERVICE_DB_USER}
      JOKE_SERVICE_DB_PASSWORD: ${JOKE_SERVICE_DB_PASSWORD}
      JOKE_SERVICE_DB_NAME: ${JOKE_SERVICE_DB_NAME}
      JOKE_SERVICE_MONGO_URL: ${JOKE_SERVICE_MONGO_URL}
      JOKE_SERVICE_MONGO_DB_NAME: ${JOKE_SERVICE_MONGO_DB_NAME}
      JOKE_SERVICE_PORT: 3000
    ports:
      - "3000:3000"

  etl-service:
    image: ${ETL_IMAGE}
    container_name: etl_service
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
        required: false
      mysql:
        condition: service_healthy
        required: false
    environment:
      ETL_SERVICE_DB_ENGINE: ${DB_PROFILE_UPPER}
      ETL_SERVICE_PORT: 3001
      ETL_SERVICE_DB_HOST: ${ETL_SERVICE_DB_HOST}
      ETL_SERVICE_DB_USER: ${ETL_SERVICE_DB_USER}
      ETL_SERVICE_DB_PASSWORD: ${ETL_SERVICE_DB_PASSWORD}
      ETL_SERVICE_DB_NAME: ${ETL_SERVICE_DB_NAME}
      ETL_SERVICE_MONGO_URL: ${ETL_SERVICE_MONGO_URL}
      ETL_SERVICE_MONGO_DB_NAME: ${ETL_SERVICE_MONGO_DB_NAME}
      ETL_SERVICE_RABBITMQ_URL: amqp://10.10.1.30:5672
      ETL_SERVICE_MODERATED_QUEUE: moderated
      ETL_SERVICE_TYPE_UPDATE_EXCHANGE: type_update
    ports:
      - "3001:3001"

volumes:
  mongo_data:
  mysql_data: