<!doctype html>
<html>
  <head>
    <title>Submit Joke</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..1000&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/submit/page/index.css" />
  </head>

  <body>
    <div class="container">
      <h1>Submit a New Joke</h1>

      <div id="typesLoading" class="status-row hidden">
        <span class="spinner"></span>
        <span>Loading cached joke types...</span>
      </div>

      <form id="jokeForm" class="form">
        <textarea id="setup" placeholder="Setup" required></textarea>

        <textarea id="punchline" placeholder="Punchline" required></textarea>

        <select id="typeSelect"></select>

        <input id="newType" placeholder="Or enter new type" />

        <button id="submitButton" type="submit">
          <span id="submitButtonText">Submit Joke</span>
          <span id="submitSpinner" class="spinner small hidden"></span>
        </button>
      </form>

      <p id="result" class="result"></p>
    </div>

    <script>
      const form = document.getElementById("jokeForm");
      const setupInput = document.getElementById("setup");
      const punchlineInput = document.getElementById("punchline");
      const typeSelect = document.getElementById("typeSelect");
      const newTypeInput = document.getElementById("newType");
      const resultEl = document.getElementById("result");
      const typesLoadingEl = document.getElementById("typesLoading");
      const submitButton = document.getElementById("submitButton");
      const submitButtonText = document.getElementById("submitButtonText");
      const submitSpinner = document.getElementById("submitSpinner");

      function showTypesLoading() {
        typesLoadingEl.classList.remove("hidden");
      }

      function hideTypesLoading() {
        typesLoadingEl.classList.add("hidden");
      }

      function setSubmitLoading(isLoading) {
        submitButton.disabled = isLoading;

        if (isLoading) {
          submitButtonText.textContent = "Submitting...";
          submitSpinner.classList.remove("hidden");
        } else {
          submitButtonText.textContent = "Submit Joke";
          submitSpinner.classList.add("hidden");
        }
      }

      function setResultMessage(message, type = "normal") {
        resultEl.textContent = message || "";
        resultEl.className = `result ${type}`;
      }

      async function loadTypes() {
        showTypesLoading();
        setResultMessage("");

        try {
          const res = await fetch("/submit/types");
          const payload = await res.json();

          if (!res.ok) {
            throw new Error(payload.error || "Failed to load cached joke types");
          }

          const types = payload.data || [];

          typeSelect.innerHTML = "";

          if (types.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "No joke types available in cache";
            typeSelect.appendChild(option);

            setResultMessage("No cached types available yet. You can still enter a new type.", "info");
          } else {
            types.forEach((t) => {
              const option = document.createElement("option");
              option.value = t.name;
              option.textContent = t.name;
              typeSelect.appendChild(option);
            });

            setResultMessage("Types loaded from local cache.", "info");
          }
        } catch (err) {
          typeSelect.innerHTML = "";
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "Unable to load joke types";
          typeSelect.appendChild(option);

          setResultMessage(err.message || "Failed to load cached joke types.", "error");
        } finally {
          hideTypesLoading();
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const setup = setupInput.value.trim();
        const punchline = punchlineInput.value.trim();
        const dropdownType = typeSelect.value;
        const newType = newTypeInput.value.trim();
        const type = newType || dropdownType;

        if (!setup || !punchline || !type) {
          setResultMessage("All fields are required.", "error");
          return;
        }

        setSubmitLoading(true);
        setResultMessage("");

        try {
          const res = await fetch("/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ setup, punchline, type }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to submit joke");
          }

          setResultMessage(data.message || "Joke submitted successfully.", "success");

          setupInput.value = "";
          punchlineInput.value = "";
          newTypeInput.value = "";
        } catch (err) {
          setResultMessage(err.message || "Failed to submit joke.", "error");
        } finally {
          setSubmitLoading(false);
        }
      });

      loadTypes();
    </script>
  </body>
</html>
