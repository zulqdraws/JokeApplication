name: Deploy Joke Stack

on:
  push:
    branches: [main]
    paths:
      - "joke-service/**"
      - "etl-service/**"
      - "db-init/**"
      - "mongo-init/**"
      - "docker-compose.joke.yml"
      - "deploy/deploy-joke.sh"
      - ".github/workflows/deploy-joke.yml"
  workflow_dispatch:
    inputs:
      db_profile:
        description: "mongo or mysql"
        required: true
        default: "mongo"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      JOKE_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jokes-joke-service
      ETL_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jokes-etl-service
      DB_PROFILE: ${{ github.event.inputs.db_profile || 'mongo' }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push joke image
        run: |
          docker build -t $JOKE_IMAGE:${GITHUB_SHA} -t $JOKE_IMAGE:latest ./joke-service
          docker push $JOKE_IMAGE:${GITHUB_SHA}
          docker push $JOKE_IMAGE:latest

      - name: Build and push etl image
        run: |
          docker build -t $ETL_IMAGE:${GITHUB_SHA} -t $ETL_IMAGE:latest ./etl-service
          docker push $ETL_IMAGE:${GITHUB_SHA}
          docker push $ETL_IMAGE:latest

      - name: Prepare SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KONG_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config <<EOF
          Host kong
              HostName ${{ secrets.KONG_HOST }}
              User ${{ secrets.KONG_USER }}
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null

          Host joke-vm
              HostName ${{ secrets.JOKE_HOST }}
              User ${{ secrets.JOKE_USER }}
              IdentityFile ~/.ssh/id_rsa
              ProxyJump kong
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF

      - name: Ensure target directory exists
        run: ssh joke-vm "mkdir -p /home/azureuser/jokes-app"

      - name: Copy deployment files to Joke VM
        run: |
          scp docker-compose.joke.yml joke-vm:/home/azureuser/jokes-app/
          scp deploy/deploy-joke.sh joke-vm:/home/azureuser/jokes-app/
          scp -r db-init joke-vm:/home/azureuser/jokes-app/
          scp -r mongo-init joke-vm:/home/azureuser/jokes-app/

      - name: Run deployment on Joke VM
        run: |
          ssh joke-vm "
            chmod +x /home/azureuser/jokes-app/deploy-joke.sh &&
            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' \
            /home/azureuser/jokes-app/deploy-joke.sh '${DB_PROFILE}' '$JOKE_IMAGE:${GITHUB_SHA}' '$ETL_IMAGE:${GITHUB_SHA}'
          "