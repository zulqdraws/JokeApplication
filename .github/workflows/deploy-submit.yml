name: Deploy Submit Service

on:
  push:
    branches: [main]
    paths:
      - "submit-service/**"
      - "docker-compose.submit.yml"
      - "deploy/deploy-submit.sh"
      - ".github/workflows/deploy-submit.yml"
  workflow_dispatch:
    inputs:
      db_profile:
        description: "mongo or mysql"
        required: true
        default: "mongo"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jokes-submit-service
      DB_PROFILE: ${{ github.event.inputs.db_profile || 'mongo' }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t $IMAGE_NAME:${GITHUB_SHA} -t $IMAGE_NAME:latest ./submit-service
          docker push $IMAGE_NAME:${GITHUB_SHA}
          docker push $IMAGE_NAME:latest

      - name: Prepare SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KONG_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config <<EOF
          Host kong
              HostName ${{ secrets.KONG_HOST }}
              User ${{ secrets.KONG_USER }}
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null

          Host submit-vm
              HostName ${{ secrets.SUBMIT_HOST }}
              User ${{ secrets.SUBMIT_USER }}
              IdentityFile ~/.ssh/id_rsa
              ProxyJump kong
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF

      - name: Ensure target directory exists
        run: ssh submit-vm "mkdir -p /home/azureuser/jokes-app"

      - name: Copy deployment files to Submit VM
        run: |
          scp docker-compose.submit.yml submit-vm:/home/azureuser/jokes-app/
          scp deploy/deploy-submit.sh submit-vm:/home/azureuser/jokes-app/

      - name: Run deployment on Submit VM
        run: |
          ssh submit-vm "
            chmod +x /home/azureuser/jokes-app/deploy-submit.sh &&
            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' \
            /home/azureuser/jokes-app/deploy-submit.sh '${DB_PROFILE}' '$IMAGE_NAME:${GITHUB_SHA}'
          "