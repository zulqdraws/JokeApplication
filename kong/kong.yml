_format_version: "3.0"
_transform: true

services:
  - name: joke-api
    url: http://10.10.1.20:3000
    routes:
      - name: joke-types
        paths:
          - /types
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local

      - name: joke-random
        paths:
          - /joke
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local

  - name: joke-ui
    url: http://10.10.1.20:3000/
    routes:
      - name: joke-ui-route
        paths:
          - /joke/page
        methods:
          - GET
        strip_path: true

  - name: submit-api
    url: http://10.30.1.20:3200
    routes:
      - name: submit-post
        paths:
          - /submit
        methods:
          - POST
        strip_path: false

  - name: submit-types
    url: http://10.30.1.20:3200/types
    routes:
      - name: submit-types-route
        paths:
          - /submit/types
        methods:
          - GET
        strip_path: true

  - name: submit-docs
    url: http://10.30.1.20:3200
    routes:
      - name: submit-docs-route
        paths:
          - /docs
        methods:
          - GET
        strip_path: false

  - name: submit-ui
    url: http://10.30.1.20:3200/
    routes:
      - name: submit-ui-route
        paths:
          - /submit/page
        methods:
          - GET
        strip_path: true

  - name: moderate-api
    url: http://10.30.1.30:3100
    routes:
      - name: moderate-get
        paths:
          - /moderate
        methods:
          - GET
        strip_path: false

      - name: moderated-post
        paths:
          - /moderated
        methods:
          - POST
        strip_path: false

  - name: moderate-types
    url: http://10.30.1.30:3100/types
    routes:
      - name: moderate-types-route
        paths:
          - /moderate/types
        methods:
          - GET
        strip_path: true

  - name: moderate-ui
    url: http://10.30.1.30:3100/
    routes:
      - name: moderate-ui-route
        paths:
          - /moderate/page
        methods:
          - GET
        strip_path: true