<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Joke Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..1000&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/joke/page/index.css" />
  </head>

  <body>
    <div class="container">
      <h1>Random Joke Generator</h1>

      <select id="typeSelect"></select>

      <button id="jokeBtn">Get Joke</button>

      <div class="joke">
        <p id="setup" class="setup"></p>
        <p id="punchline" class="punchline"></p>
      </div>
    </div>

    <script>
      async function loadTypes() {
        try {
          const res = await fetch("/types");
          const types = await res.json();

          const select = document.getElementById("typeSelect");
          select.innerHTML = "";

          const anyOption = document.createElement("option");
          anyOption.value = "any";
          anyOption.textContent = "Any";
          select.appendChild(anyOption);

          types.forEach((t) => {
            const option = document.createElement("option");
            option.value = t.name;
            option.textContent = t.name;
            select.appendChild(option);
          });
        } catch (err) {
          console.error("Failed to load types:", err);
        }
      }

      async function getJoke() {
        try {
          const type = document.getElementById("typeSelect").value;

          const res = await fetch(`/joke/${type}`);
          const data = await res.json();

          if (!Array.isArray(data) || data.length === 0) {
            document.getElementById("setup").textContent = "No joke found.";
            document.getElementById("punchline").textContent = "";
            return;
          }

          const joke = data[0];

          document.getElementById("setup").textContent = joke.setup || "";
          document.getElementById("punchline").textContent = "";

          setTimeout(() => {
            document.getElementById("punchline").textContent = joke.punchline || "";
          }, 3000);
        } catch (err) {
          console.error("Failed to fetch joke:", err);
          document.getElementById("setup").textContent = "Failed to load joke.";
          document.getElementById("punchline").textContent = "";
        }
      }

      document.getElementById("jokeBtn").addEventListener("click", getJoke);

      loadTypes();
    </script>
  </body>
</html>
